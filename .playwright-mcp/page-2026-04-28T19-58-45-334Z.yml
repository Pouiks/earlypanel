  - generic [ref=e229]:
    - generic [ref=e230]: Questions fréquentes
    - generic [ref=e231]: Vos questions, nos réponses.
    - generic [ref=e232]:
      - generic [ref=e233]:
        - generic [ref=e234] [cursor=pointer]:
          - heading "Est-ce que je dois déclarer ces revenus ?" [level=4] [ref=e235]
          - img [ref=e237]
        - paragraph [ref=e239]: Oui. Les revenus issus des tests sont des revenus complémentaires à déclarer aux impôts. Stripe vous fournit un récapitulatif annuel de vos gains pour simplifier votre déclaration.
      - generic [ref=e240]:
        - generic [ref=e241] [cursor=pointer]:
          - heading "Combien de temps faut-il par mission ?" [level=4] [ref=e242]
          - img [ref=e244]
        - paragraph [ref=e246]: En moyenne 25 minutes. Chaque invitation précise la durée estimée avant que vous acceptiez. Vous ne pouvez jamais être surpris par une mission plus longue que prévue.
      - generic [ref=e247]:
        - generic [ref=e248] [cursor=pointer]:
          - heading "Quand et comment suis-je payé ?" [level=4] [ref=e249]
          - img [ref=e251]
        - paragraph [ref=e253]: Par virement bancaire sous 72h après validation de votre test. Vous configurez votre IBAN une seule fois via notre interface sécurisée Stripe. Aucun intermédiaire.
      - generic [ref=e254]:
        - generic [ref=e255] [cursor=pointer]:
          - heading "Que se passe-t-il si mon test est refusé ?" [level=4] [ref=e256]
          - img [ref=e258]
        - paragraph [ref=e260]: On vous explique pourquoi par email. Un test est refusé uniquement si les réponses sont trop courtes ou incohérentes. Vous ne serez pas payé pour ce test, mais votre profil reste actif.
      - generic [ref=e261]:
        - generic [ref=e262] [cursor=pointer]:
          - heading "Mes données personnelles sont-elles protégées ?" [level=4] [ref=e263]
          - img [ref=e265]
        - paragraph [ref=e267]: Absolument. Vos données ne sont jamais revendues à des tiers. Elles servent uniquement au matching avec les missions. Tout est conforme RGPD, vous pouvez demander leur suppression à tout moment.
      - generic [ref=e268]:
        - generic [ref=e269] [cursor=pointer]:
          - heading "Combien de missions vais-je recevoir par mois ?" [level=4] [ref=e270]
          - img [ref=e272]
        - paragraph [ref=e274]: Cela dépend de votre profil et de la demande côté clients. En moyenne, nos testeurs reçoivent 1 à 3 missions par mois. Les profils rares et experts reçoivent davantage d'invitations.
